name: Сбор ссылок на рилсы

on:
  schedule:
    - cron: '15 */2 * * *'   # каждые 2 часа
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: reels-repo
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Забрать новые ссылки из Telegram
        env:
          REELS_BOT_TOKEN: ${{ secrets.REELS_BOT_TOKEN }}
        run: python collector.py

      - name: Сохранить
        run: |
          git config user.name "reels-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reels.json state.json
          git diff --cached --quiet || git commit -m "Новые ссылки"
          git push
